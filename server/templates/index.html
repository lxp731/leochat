<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Chat Room</title>
  <script src="https://cdn.socket.io/4.3.2/socket.io.min.js"></script> 
</head>
<body>
  <h1>Simple Chat Room</h1>

  <div id="chat" style="border:1px solid #ccc; height:300px; overflow-y:scroll; padding:10px;">
  </div>

  <input type="text" id="username" placeholder="Your name">
  <input type="text" id="message" placeholder="Type a message">
  <button onclick="sendMessage()">Send</button>

  <script>
    const socket = io();

    // 接收消息
    socket.on('message', function(data) {
      const chatDiv = document.getElementById('chat');
      chatDiv.innerHTML += `<p><b>${data.user}:</b> ${data.text}</p>`;
      chatDiv.scrollTop = chatDiv.scrollHeight;
    });

    // 发送消息
    function sendMessage() {
      const user = document.getElementById('username').value.trim();
      const text = document.getElementById('message').value.trim();
      if (!user || !text) return alert("Please enter username and message.");

      socket.emit('send_message', { user, text });
      document.getElementById('message').value = '';
    }
  </script>
</body>
</html>

<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Leochat | 实时在线聊天室</title>
    <!-- Google Fonts: Inter -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <!-- Main Styles -->
    <link rel="stylesheet" href="{{ url_for('static', filename='css/main.css') }}">
</head>
<body>

    <aside class="sidebar">
        <div class="sidebar-header">
            <h2><span class="dot" id="statusDot"></span> Leochat</h2>
            <div class="online-count" id="onlineCount">— online</div>
        </div>
        <div class="user-list" id="userList">
            <!-- Online users will appear here -->
        </div>
        <div class="sidebar-footer" id="sidebarFooter">正在连接...</div>
    </aside>

    <main class="main">
        <header class="chat-header">
            <h3>💬 公共大厅</h3>
            <span class="conn-status" id="connStatus">🔴 未连接</span>
        </header>
        
        <div class="messages" id="messages">
            <!-- Messages will appear here -->
        </div>

        <div class="input-area">
            <div class="input-row">
                <input type="text" class="name-input" id="username" placeholder="您的昵称" maxlength="20">
                <input type="text" id="message" placeholder="输入消息，按回车发送..." maxlength="2000">
                <button class="btn-send" id="sendBtn" title="发送 (Enter)">➤</button>
            </div>
        </div>
    </main>

    <button class="scroll-btn" id="scrollBtn" title="滚到底部">↓</button>
    <div class="toast" id="toast"></div>

    <!-- Scripts -->
    <script src="https://cdn.socket.io/4.3.2/socket.io.min.js"></script>
    <script src="{{ url_for('static', filename='js/main.js') }}"></script>
</body>
</html>

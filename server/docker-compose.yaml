services:
  backend:
    build:
      context: .
    container_name: leoroom
    ports:
      - "5000:5000"
    environment:
      - CHAT_PORT=5000
      - CHAT_DEBUG=false
      # SECRET_KEY: 生产环境应设为固定值，否则容器重启后旧 session 失效
      # - SECRET_KEY=your-secret-key-here
      - DB_PATH=/data/leochat.db
    volumes:
      - ./data:/data
